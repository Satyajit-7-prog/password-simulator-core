<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Generator - Password Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🛡️ Secure Generator</h1>
        <a href="index.html" class="back-link">← Back to Home</a>

        <div class="attack-box">
            <h3>Cryptographic Password Creator</h3>
            <p>Uses Python's 'secrets' library to generate mathematically unbreakable passwords.</p>
            
            <div style="margin: 20px 0; font-family: 'Fira Code', monospace;">
                <label style="color: #00ffcc; font-size: 18px;">Length: </label>
                <input type="number" id="genLength" value="16" min="8" max="128" style="width: 80px; padding: 8px; background: #000; color: #00ffcc; border: 1px solid #334155; border-radius: 4px; outline: none;">
                
                <br><br>
                <label style="color: #e2e8f0; cursor: pointer;"><input type="checkbox" id="genNumbers" checked style="accent-color: #00ffcc;"> Include Numbers</label>
                <br><br>
                <label style="color: #e2e8f0; cursor: pointer;"><input type="checkbox" id="genSymbols" checked style="accent-color: #00ffcc;"> Include Symbols</label>
            </div>

            <button onclick="generatePassword()">Generate Password</button>
            <div id="genResult" class="result-box"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
